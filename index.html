<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Reid Maps" />
    <meta name="theme-color" content="#0b0b0f" />
    <title>Reid Maps</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">Navigation</p>
        <h1>Reid Maps</h1>
      </header>

      <section id="groups" class="group-list" aria-label="Saved destinations"></section>
    </main>

    <template id="group-template">
      <section class="group is-open">
        <button class="group-toggle" type="button" aria-expanded="true">
          <span class="group-toggle-text">
            <span class="group-icon" aria-hidden="true"></span>
            <span class="group-title"></span>
          </span>
          <span class="chevron" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M8 10l4 4 4-4" />
            </svg>
          </span>
        </button>
        <div class="group-content">
          <div class="button-grid"></div>
        </div>
      </section>
    </template>

    <template id="button-template">
      <a class="destination-button" rel="noopener noreferrer">
        <span class="destination-content">
          <span class="destination-icon" aria-hidden="true"></span>
          <span class="destination-name"></span>
        </span>
      </a>
    </template>

    <script src="script.js"></script>
  </body>
</html>
